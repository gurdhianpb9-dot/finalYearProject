<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career & Interview Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #a0a46f;
        }

        .sidebar {
            height: 100vh;
            background: #550d0d;
            color: white;
            padding: 20px;
        }

        .sidebar button {
            width: 100%;
            margin-bottom: 20px;
        }

        .main {
            padding: 30px;
        }
    </style>

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-3 sidebar">

                <h4 class="mb-4">Career Assistant</h4>

                <button class="btn btn-outline-light" onclick="showPlacement()">Placement Prep</button>

                <button class="btn btn-outline-light" onclick="showHR()">HR Questions</button>

                <button class="btn btn-outline-light" onclick="showAptitude()">Aptitude Quiz</button>

                <button class="btn btn-outline-light" onclick="showTechnical()">Technical Interview</button>

                <button class="btn btn-outline-light" onclick="showResume()">Resume Analyzer</button>

                <button class="btn btn-outline-light" onclick="showAI()">AI Mock Interview</button>

            </div>

            <!-- Main Content -->

            <div class="col-md-9 main">

                <div id="content">

                    <h1>Welcome</h1>
                    <h2>Career & Interview Assistant</h2>
                    <p><b>Select a module from the sidebar.</p>
                    <img src="career.jpg" alt="career image " height="400" width="550">
                </div>

            </div>

        </div>

    </div>

    <script>

        const hrQuestions = [
            "Tell me about yourself",
            "Why should we hire you?",
            "What are your strengths?",
            "Where do you see yourself in 5 years?"
        ]

        const techQuestions = [
            "What is Python?",
            "Explain Object Oriented Programming",
            "What is REST API?",
            "Difference between Stack and Queue"
        ]

        function showPlacement() {

            document.getElementById("content").innerHTML = `
<h3>Placement Preparation</h3>

<ul>
<li>Practice Data Structures daily</li>
<li>Build 2-3 strong projects</li>
<li>Improve communication skills</li>
<li>Prepare coding interview problems</li>
</ul>
`

        }

        function showHR() {

            let list = ""

            hrQuestions.forEach(q => {
                list += `<li>${q}</li>`
            })

            document.getElementById("content").innerHTML = `
<h3>HR Interview Questions</h3>

<ul>${list}</ul>
`

        }

        function showTechnical() {

            let list = ""

            techQuestions.forEach(q => {
                list += `<li>${q}</li>`
            })

            document.getElementById("content").innerHTML = `
<h3>Technical Interview Questions</h3>

<ul>${list}</ul>
`

        }

        function showAptitude() {

            document.getElementById("content").innerHTML = `

<h3>Aptitude Quiz</h3>

<p><b>Question:</b> What is 18 + 24 ?</p>

<button class="btn btn-success" onclick="checkAns(42)">42</button>
<button class="btn btn-danger" onclick="checkAns(40)">40</button>
<button class="btn btn-warning" onclick="checkAns(35)">35</button>

<p id="result" class="mt-3"></p>

`

        }

        function checkAns(a) {

            if (a == 42) {
                document.getElementById("result").innerHTML = "Correct Answer"
            } else {
                document.getElementById("result").innerHTML = "Wrong Answer"
            }

        }

        function showResume() {

            document.getElementById("content").innerHTML = `

<h3>Resume Analyzer</h3>

<textarea class="form-control" id="resume" rows="6" placeholder="Paste your resume here"></textarea>

<button class="btn btn-primary mt-3" onclick="analyzeResume()">Analyze Resume</button>

<div id="feedback" class="mt-3"></div>

`

        }

        function analyzeResume() {

            document.getElementById("feedback").innerHTML = `

<h5>Suggestions</h5>

<ul>
<li>Add more technical projects</li>
<li>Mention GitHub profile</li>
<li>Keep resume within 1 page</li>
<li>Highlight Python and AI skills</li>
</ul>

`

        }

        function showAI() {

            document.getElementById("content").innerHTML = `

<h3>AI Mock Interview</h3>

<p><b>AI:</b> Tell me about yourself.</p>

<input type="text" class="form-control" id="userAnswer" placeholder="Type your answer">

<button class="btn btn-primary mt-3" onclick="aiReply()">Submit</button>

<div id="aiResponse" class="mt-3"></div>

`

        }

        function aiReply() {

            let answer = document.getElementById("userAnswer").value

            document.getElementById("aiResponse").innerHTML =

                "<b>AI Feedback:</b> Good start. Try to mention your skills, projects, and career goals."

        }

    </script>

</body>

</html>
